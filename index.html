<!DOCTYPE html>
<html lang="zh-Hant">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>我的網址收藏</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <script src="script.js"></script>
