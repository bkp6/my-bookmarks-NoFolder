<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>我的網址收藏</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>我的網址收藏</h1>

<h2>資料夾管理</h2>
<div class="form">
    <input id="newFolder" type="text" placeholder="新增資料夾名稱">
    <button id="addFolderBtn">新增資料夾</button>
</div>

<h2>資料夾列表</h2>
<select id="folderSelect"></select>

<div class="form">
    <input id="renameFolder" type="text" placeholder="重新命名資料夾">
    <button id="renameFolderBtn">重新命名</button>
    <button id="deleteFolderBtn">刪除資料夾</button>
</div>

<h2>新增網址</h2>
<div class="form">
    <input id="name" type="text" placeholder="名稱（例如：YouTube）">
    <input id="url" type="url" placeholder="網址（例如：https://www.youtube.com）">
    <button id="addBtn">新增網址</button>
</div>

<ul id="list"></ul>

<script src="script.js"></script>
</body>
</html>
